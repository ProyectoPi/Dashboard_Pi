      <!-- Selector -->
  <div class="flex justify-center">
    <select id="matrixSelector" class="bg-gray-800 text-gray-100 p-2 rounded w-6xl">

  </div>

    
    <div id="heatmap" class="w-full h-96 bg-gray-800 shadow rounded"></div>

    
    <div class="grid grid-cols-2 gap-4">

        <div id="gauge3" class="w-full h-100 bg-gray-800 shadow rounded"></div>
        <div id="gauge4" class="w-full h-100 bg-gray-800 shadow rounded"></div>
    </div>
</div>

<script>

// Función para generar matrices y valores de indicadores
function generateMatrix(type) {
  if (type === 'A') {
    return {
      z: [[1,20,30],[20,1,60],[30,60,1]],
      gauges: [70,45,85,30]
    };
  } else if (type === 'B') {
    return {
      z: [[5,10,15],[10,5,20],[15,20,5]],
      gauges: [50,60,40,75]
    };
  } else {
    return {
      z: [[2,8,12],[8,2,18],[12,18,2]],
      gauges: [20,90,55,65]
    };
  }
}

// Render inicial
let current = generateMatrix('A');

Plotly.newPlot('heatmap', [{
  z: current.z,
  type: 'heatmap',
  colorscale: 'Viridis'
}], {
  paper_bgcolor: '#111',
  plot_bgcolor: '#111',
  font: { color: '#eee' }
});

// Función para crear gauges
function createGauge(id, value, title) {
  Plotly.newPlot(id, [{
    type: "indicator",
    mode: "gauge+number",
    value: value,
    title: { text: title, font: { color: '#eee' } },
    gauge: {
      axis: { range: [0, 100], tickcolor: '#eee' },
      bar: { color: "#36a2eb" },
      bgcolor: "#111",
      bordercolor: "#444",
      steps: [
        { range: [0, 50], color: "#333" },
        { range: [50, 100], color: "#555" }
      ]
    }
  }], {
    paper_bgcolor: '#111',
    font: { color: '#eee' }
  });
}

// Render inicial de gauges
createGauge('gauge1', current.gauges[0], 'Indicador 1');
createGauge('gauge2', current.gauges[1], 'Indicador 2');
createGauge('gauge3', current.gauges[2], 'Indicador 3');
createGauge('gauge4', current.gauges[3], 'Indicador 4');

// Evento selector
document.getElementById('matrixSelector').addEventListener('change', (e) => {
  const newData = generateMatrix(e.target.value);

  // Actualizar heatmap
  Plotly.restyle('heatmap', { z: [newData.z] });

  // Actualizar gauges
  Plotly.restyle('gauge1', { value: [newData.gauges[0]] });
  Plotly.restyle('gauge2', { value: [newData.gauges[1]] });
  Plotly.restyle('gauge3', { value: [newData.gauges[2]] });
  Plotly.restyle('gauge4', { value: [newData.gauges[3]] });
});



</script>
