{% extends "dashboard/base.html" %}

{% block title %}Inicio{% endblock %}
{% block content %}

 <!-- Primera fila: métricas -->
      <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-6">
        <div class="bg-black border border-orange-400 shadow rounded p-4"><h2>Usuarios</h2><p class="text-3xl">120</p></div>
        <div class="bg-black border border-orange-400 shadow rounded p-4"><h2>Clientes</h2><p class="text-3xl">85</p></div>
        <div class="bg-black border border-orange-400 shadow rounded p-4"><h2>Proyectos</h2><p class="text-3xl">42</p></div>
        <div class="bg-black border border-orange-400 shadow rounded p-4"><h2>Ciudades</h2><p class="text-3xl">18</p></div>
      </div>

      <!-- Segunda fila: mapa + indicadores -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-6">
        <div class="bg-black border border-orange-400 shadow rounded p-6">
          <h2 class="mb-4">Indicadores Generales</h2>
          <div id="indicadoresGrafico"></div>
        </div>
        <div class="bg-black border border-orange-400 shadow rounded p-6">
          <h2 class="mb-4">Mapa 3D</h2>
          <div id="mapaMundi"></div>
        </div>
      </div>

      <!-- Tercera fila: dos columnas con gráficos -->
      <div class="grid grid-cols-1 lg:grid-cols-2 gap-6">
        <div class="bg-black border border-orange-400 shadow rounded p-6">
          <h2 class="mb-4">Estimadores Izquierda</h2>
          <div id="estimadoresIzq"></div>
        </div>
        <div class="bg-black border border-orange-400 shadow rounded p-6">
          <h2 class="mb-4">Estimadores Derecha</h2>
          <div id="estimadoresDer"></div>
        </div>
      </div>

{% endblock %}
