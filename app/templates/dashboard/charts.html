{% extends "dashboard/base.html" %}

{% block title %}Gráficos{% endblock %}
{% block content %}

<div class="grid grid-cols-1 lg:grid-cols-1 gap-6 h-[600px]">

  <!-- Primera fila: gráfico de línea -->
  <div id="lineChart" style="width:100%; height:300px;" class="bg-gray-800 shadow rounded"></div>

  <!-- Segunda fila: dos columnas -->
  <div style="display:flex; flex-wrap:wrap; gap:20px;">
    <!-- Columna izquierda: espectrograma 3D -->
    <div id="spectrogram3d" style="flex:1; min-width:300px; height:300px;" class="bg-gray-800 shadow rounded"></div>

    <!-- Columna derecha: gráfico de Fourier -->
    <div id="fourierChart" style="flex:1; min-width:300px; height:300px;" class="bg-gray-800 shadow rounded"></div>
  </div>
</div>


<script>

  Plotly.newPlot('lineChart', [{
    x: ['X1', 'X2', 'X3'],
    y: [10, 20, 15],
    type: 'scatter',
    mode: 'lines+markers',
    line: { color: '#36a2eb' }
  }], {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    font: { color: '#eee' },
    responsive: true
  });


  // Datos simulados para espectrograma
  // Generar varios conjuntos de datos simulados
  function generateSpectrogram(type) {
    const zData = [];
    for (let i = 0; i < 20; i++) {
      const row = [];
      for (let j = 0; j < 20; j++) {
        if (type === 'A') {
          row.push(Math.sin(i / 2) * Math.cos(j / 2));
        } else if (type === 'B') {
          row.push(Math.cos(i / 3) * Math.sin(j / 3));
        } else {
          row.push(Math.sin(i / 4) * Math.sin(j / 4));
        }
      }
      zData.push(row);
    }
    return zData;
  }

  // Dataset inicial
  const zInit = generateSpectrogram('A');

  Plotly.newPlot('spectrogram3d', [{
    z: zInit,
    type: 'surface',
    colorscale: 'Viridis'
  }], {
    paper_bgcolor: 'rgba(0,0,0,0)',
    scene: { bgcolor: 'rgba(0,0,0,0)' },
    font: { color: '#eee' },
    updatemenus: [{
      buttons: [
        {
          method: 'restyle',
          args: ['z', [generateSpectrogram('A')]],
          label: 'Patrón A'
        },
        {
          method: 'restyle',
          args: ['z', [generateSpectrogram('B')]],
          label: 'Patrón B'
        },
        {
          method: 'restyle',
          args: ['z', [generateSpectrogram('C')]],
          label: 'Patrón C'
        }
      ],
      direction: 'down',
      showactive: true,
      x: 0.1,
      y: 1.2
    }]
  });



  Plotly.newPlot('fourierChart', [{
    x: ['f1', 'f2', 'f3'],
    y: [5, 12, 8],
    type: 'line',
    marker: { color: '#ff6384' }
  }], {
    paper_bgcolor: 'rgba(0,0,0,0)',
    plot_bgcolor: 'rgba(0,0,0,0)',
    font: { color: '#eee' },
    responsive: true
  });




</script>

{% endblock %}
