server {
    listen 80;
    server_name pi.engx.cloud;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://pi.engx.cloud$request_uri; }
}

# ⚠️  FASE 5: comenta el bloque :443 hasta que exista el certificado,
#     luego descoméntalo y recarga nginx.
server {
    listen 443 ssl;
    server_name pi.engx.cloud;
    ssl_certificate     /etc/letsencrypt/live/pi.engx.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/pi.engx.cloud/privkey.pem;

    location / {
        proxy_pass         http://dashboard_pi:8000;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_buffering    off;
    }
}
