server {
    listen 80;
    server_name n8n.engx.cloud;
    location /.well-known/acme-challenge/ { root /var/www/certbot; }
    location / { return 301 https://n8n.engx.cloud$request_uri; }
}

# ⚠️  FASE 6: comenta el bloque :443 hasta que exista el certificado,
#     luego descoméntalo y recarga nginx.
server {
    listen 443 ssl;
    server_name n8n.engx.cloud;
    ssl_certificate     /etc/letsencrypt/live/n8n.engx.cloud/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/n8n.engx.cloud/privkey.pem;

    location / {
        proxy_pass                   http://n8n_server:5678;
        proxy_set_header             Host              $host;
        proxy_set_header             X-Real-IP         $remote_addr;
        proxy_set_header             X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header             X-Forwarded-Proto $scheme;
        proxy_http_version           1.1;
        proxy_set_header             Upgrade    $http_upgrade;
        proxy_set_header             Connection "upgrade";
        chunked_transfer_encoding    off;
        proxy_buffering              off;
        proxy_cache                  off;
    }
}
